# Deploy Agent Foundry to AKS when pushing to the master branch.
# Builds and pushes images to ACR, then deploys via kubectl + Kustomize.
name: Deploy to AKS (master branch)

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-master
  cancel-in-progress: true

env:
  ACR_NAME: ${{ vars.ACR_NAME || secrets.ACR_NAME }}
  AKS_NAME: ${{ vars.AKS_NAME || secrets.AKS_NAME }}
  AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP || secrets.AKS_RESOURCE_GROUP }}
  NAMESPACE: workmage
  # Use 'azure' overlay (no in-cluster postgres/redis) when USE_AZURE_SERVICES=true
  K8S_OVERLAY: ${{ vars.USE_AZURE_SERVICES == 'true' && 'azure' || 'demo' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: |
          az acr login --name ${{ env.ACR_NAME }}
          echo "ACR_LOGIN_SERVER=$(az acr show -n ${{ env.ACR_NAME }} --query loginServer -o tsv)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push agent-foundry-api
        uses: docker/build-push-action@v6
        with:
          context: ./agent-foundry-api
          file: ./agent-foundry-api/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/agent-foundry-api:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/agent-foundry-api:demo
          cache-from: type=gha
          cache-to: type=gha

      - name: Build and push agent-foundry-frontend
        uses: docker/build-push-action@v6
        with:
          context: ./agent-foundry-frontend
          file: ./agent-foundry-frontend/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/agent-foundry-frontend:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/agent-foundry-frontend:demo
          cache-from: type=gha
          cache-to: type=gha

      - name: Build and push agent-sandbox
        uses: docker/build-push-action@v6
        with:
          context: ./agent-sandbox
          file: ./agent-sandbox/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/agent-sandbox:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/agent-sandbox:demo
          cache-from: type=gha
          cache-to: type=gha

      - name: Build and push twitter-automation-service
        uses: docker/build-push-action@v6
        with:
          context: ./twitter-automation-service
          file: ./twitter-automation-service/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/twitter-automation-service:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/twitter-automation-service:demo
          cache-from: type=gha
          cache-to: type=gha

      - name: Get AKS credentials
        run: |
          az aks get-credentials --resource-group ${{ env.AKS_RESOURCE_GROUP }} --name ${{ env.AKS_NAME }} --overwrite-existing

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.4.1'

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Ensure NGINX Ingress Controller
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml
          echo "Waiting for ingress controller LoadBalancer to get external IP..."
          for i in $(seq 1 60); do
            EXTERNAL_IP=$(kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [ -n "$EXTERNAL_IP" ]; then
              echo "EXTERNAL_IP=$EXTERNAL_IP" >> $GITHUB_ENV
              echo "Ingress external IP: $EXTERNAL_IP"
              break
            fi
            sleep 5
          done

      - name: Verify secret exists (Azure overlay)
        if: env.K8S_OVERLAY == 'azure'
        run: |
          if ! kubectl get secret workmage-secrets -n ${{ env.NAMESPACE }} &>/dev/null; then
            echo "::error::workmage-secrets not found. Create it with Azure DATABASE_URL and REDIS_URL before deploying. See docs/deploy-azure-infrastructure.md step 10."
            exit 1
          fi

      - name: Set image tags and deploy
        run: |
          cd k8s/${{ env.K8S_OVERLAY }}
          kustomize edit set image agent-foundry-api:latest=${{ env.ACR_LOGIN_SERVER }}/agent-foundry-api:demo
          kustomize edit set image agent-foundry-frontend:latest=${{ env.ACR_LOGIN_SERVER }}/agent-foundry-frontend:demo
          kustomize edit set image agent-sandbox:latest=${{ env.ACR_LOGIN_SERVER }}/agent-sandbox:demo
          kustomize edit set image twitter-automation-service:latest=${{ env.ACR_LOGIN_SERVER }}/twitter-automation-service:demo
          kubectl apply -k .

      - name: Set worker sandbox image
        run: |
          kubectl set env deployment/worker -n ${{ env.NAMESPACE }} \
            AGENT_SANDBOX_IMAGE=${{ env.ACR_LOGIN_SERVER }}/agent-sandbox:demo

      - name: Output access instructions
        if: env.EXTERNAL_IP != ''
        run: |
          echo "## Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**To access the site:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Add this line to your hosts file (\`C:\\Windows\\System32\\drivers\\etc\\hosts\` on Windows, \`/etc/hosts\` on Mac/Linux):" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.EXTERNAL_IP }}  demo.example.com  api-demo.example.com" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "2. Open **http://demo.example.com** in your browser." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Or point your domain's DNS A records to \`${{ env.EXTERNAL_IP }}\` and update the ingress/ConfigMap hostnames." >> $GITHUB_STEP_SUMMARY
