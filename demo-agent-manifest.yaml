name: Web Summarizer Agent
version: "1.0.0"
schema_version: "1.0.0"
description: A simple agent that fetches web pages via MCP and summarizes their content. Paste a URL and get a concise summary.
authors:
  - Workmage Demo
created_at: "2025-02-14T00:00:00Z"
skills:
  - name: natural_language_processing/natural_language_generation/text_summarization
    id: 201
  - name: web/web_scraping
    id: 301
domains:
  - name: technology/web_technologies
    id: 1501
modules:
  - name: mcp_web_fetch
    type: mcp
    description: MCP server for fetching web content
    config:
      server_type: stdio
      command: npx
      args:
        - -y
        - "@modelcontextprotocol/server-fetch"
locators:
  - type: source_code
    urls:
      - https://github.com/modelcontextprotocol/servers
