apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-foundry
  namespace: workmage
spec:
  ingressClassName: nginx
  rules:
    - host: api-demo.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
    - host: demo.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 5173
  # tls:
  #   - hosts: [api-demo.example.com, demo.example.com]
  #     secretName: agent-foundry-tls
