apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-foundry
  namespace: workmage
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - demo.workmage.app
        - api-demo.workmage.app
      secretName: workmage-tls
  rules:
    - host: api-demo.workmage.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
    - host: demo.workmage.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 5173
