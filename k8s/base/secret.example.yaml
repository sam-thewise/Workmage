# Reference only: required keys for agent-foundry-secrets. Do NOT add this file to
# kustomization.yaml resources (that would overwrite real secrets with example values).
#
# Create the secret out-of-band, e.g.:
#   kubectl create secret generic agent-foundry-secrets -n agent-foundry \
#     --from-literal=POSTGRES_PASSWORD='...' \
#     --from-literal=DATABASE_URL='postgresql+asyncpg://user:pass@host:5432/db' \
#     --from-literal=DATABASE_SYNC_URL='postgresql://user:pass@host:5432/db' \
#     --from-literal=REDIS_URL='redis://host:6379/0' \
#     --from-literal=SECRET_KEY='your-secret-key'
# Or use External Secrets / your vault; the demo overlay uses a secretGenerator for demo only.
---
apiVersion: v1
kind: Secret
metadata:
  name: agent-foundry-secrets
  namespace: agent-foundry
type: Opaque
stringData:
  POSTGRES_PASSWORD: "postgres"
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/agentfoundry"
  DATABASE_SYNC_URL: "postgresql://postgres:postgres@postgres:5432/agentfoundry"
  REDIS_URL: "redis://redis:6379/0"
  SECRET_KEY: "change-me-in-production"
