apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agent-foundry

# agent-foundry-secrets is NOT in resources. Create it out-of-band (kubectl create secret,
# External Secrets, etc.) or use the demo overlay which provides a secretGenerator for demo only.
resources:
  - namespace.yaml
  - configmap.yaml
  - postgres.yaml
  - redis.yaml
  - api-deployment.yaml
  - worker-deployment.yaml
  - beat-deployment.yaml
  - twitter-automation.yaml
  - frontend-deployment.yaml
  - ingress.yaml
