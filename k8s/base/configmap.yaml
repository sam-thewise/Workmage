apiVersion: v1
kind: ConfigMap
metadata:
  name: workmage-config
  namespace: workmage
data:
  ENVIRONMENT: "production"
  FRONTEND_URL: "http://demo.workmage.app"
  API_PUBLIC_URL: "http://api-demo.workmage.app"
  VITE_API_URL: "http://api-demo.workmage.app/api/v1"
  TWITTER_MCP_URL: "http://twitter-automation:8010/mcp/twitter"
  TWITTER_MCP_TIMEOUT_SEC: "60"
  TWITTER_MCP_RETRIES: "2"
  TWITTER_MCP_HEALTH_PATH: "/health"
  # Override these in demo overlay or patch for your hostnames
