services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentfoundry
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./agent-foundry-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./agent-foundry-api:/app
      - ./.env:/app/.env:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/agentfoundry
      DATABASE_SYNC_URL: postgresql://postgres:postgres@postgres:5432/agentfoundry
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:8000}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./agent-foundry-api
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/agentfoundry
      DATABASE_SYNC_URL: postgresql://postgres:postgres@postgres:5432/agentfoundry
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      AGENT_SANDBOX_IMAGE: agent-sandbox:latest
      AGENT_RUNS_DIR: /agent-runs
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./agent-foundry-api:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - agent_runs:/agent-runs
    command: celery -A app.worker.celery_app worker --loglevel=info

  agent-sandbox:
    build:
      context: ./agent-sandbox
      dockerfile: Dockerfile
    image: agent-sandbox:latest
    profiles:
      - build

  frontend:
    build:
      context: ./agent-foundry-frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./agent-foundry-frontend:/app
      - /app/node_modules  # container-managed deps (Linux); populated by npm ci in container
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    command: npm run dev
    depends_on:
      - api

volumes:
  postgres_data:
  agent_runs:
    name: agent_foundry_runs
